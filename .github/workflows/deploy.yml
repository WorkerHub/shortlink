name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
      WRANGLER_SEND_METRICS: "false"
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Inject resource IDs
        run: |
          sed -i "s/D1_DATABASE_ID_PLACEHOLDER/${{ vars.D1_DATABASE_ID }}/g" apps/worker/wrangler.toml
          sed -i "s/D1_DATABASE_NAME_PLACEHOLDER/${{ vars.D1_DATABASE_NAME || 'shortlink' }}/g" apps/worker/wrangler.toml
          sed -i "s/KV_NAMESPACE_ID_PLACEHOLDER/${{ vars.KV_NAMESPACE_ID }}/g" apps/worker/wrangler.toml
          sed -i "s/CLOUDFLARE_ACCOUNT_ID_PLACEHOLDER/${{ vars.CLOUDFLARE_ACCOUNT_ID }}/g" apps/worker/wrangler.toml

      - name: Deploy
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
